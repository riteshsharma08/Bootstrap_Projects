<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mb-5">
        <h2 class="py-3 text-center">Nav Bar Practice</h2>
        <div class="row py-3">
            <div class="col">
                <nav class="navbar  navbar-expand-lg navbar-light bg-light">
                    <a href="#" class="navbar-brand">IT Tech Solution</a>
                    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                   <div class="collapse navbar-collapse" id="mynavbar">
                     <ul class="navbar-nav">
                        <li class="nav-item">
                            <a href="#" class="nav-link">HOME</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">PRODUCT</a>
                            <div class="dropdown-menu">
                                <a href="#" class="dropdown-item">Apple</a>
                                <a href="#" class="dropdown-item">Samsung</a>
                                <a href="#" class="dropdown-item">xiaomi</a>
                                <a href="#" class="dropdown-item">Vivo</a>
                            </div>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">SERVICES</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">ABOUT US</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">CONTACT US</a>
                        </li>
                    </ul>
                    <form action="" class ="form-inline">
                        <input type="search" class="form-control mr-sm-2" placeholder="Search">
                        <button class="btn btn-outline-success my-2 my-sm-0">Search</button>
                    </form>
                   </div>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
